<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="./css/material-requests.css" />

    <link rel="stylesheet" href="./css/staff-portal-base.css" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Document</title>
  </head>
  <body>
    <main class="staff-mobile-layout material-requests-mobile d-lg-none">
      <header class="staff-mobile-header">
        <a href="inventory-dashboard.html" class="staff-mobile-brand">
          <img src="images/PlantedLogo1.png" alt="Planted Logo" class="staff-mobile-logo" />
          <span class="staff-mobile-brand-text">Planted Staff</span>
        </a>
        <a href="../login-portal/LoginPortal.html" class="staff-mobile-signout">Sign Out</a>
      </header>

      <nav class="staff-mobile-nav">
        <a href="staff-scheduling-dashboard.html" class="staff-mobile-nav-link">Scheduling</a>
        <a href="task-management-dashboard.html" class="staff-mobile-nav-link">Tasks</a>
        <a href="inventory-dashboard.html" class="staff-mobile-nav-link active">Inventory</a>
      </nav>

      <section class="staff-mobile-card">
        <h1 class="staff-mobile-title">Request Materials</h1>
        <p class="staff-mobile-subtitle">Request supplies</p>

        <form class="staff-mobile-form" novalidate>
          <label class="staff-mobile-field" for="request-item-input-mobile">
            <span class="staff-mobile-label">Item</span>
            <input
              type="text"
              id="request-item-input-mobile"
              class="staff-mobile-input"
              placeholder="Search"
            />
          </label>

          <label class="staff-mobile-field" for="request-quantity-input-mobile">
            <span class="staff-mobile-label">Quantity</span>
            <input
              type="number"
              id="request-quantity-input-mobile"
              class="staff-mobile-input"
              placeholder="Enter Amount"
              min="0"
              step="any"
            />
          </label>

          <label class="staff-mobile-field" for="request-note-input-mobile">
            <span class="staff-mobile-label">Note</span>
            <textarea
              id="request-note-input-mobile"
              class="staff-mobile-textarea"
              placeholder="Add note"
            ></textarea>
          </label>

          <button type="button" id="submit-material-request-mobile" class="staff-mobile-button">
            Submit
          </button>
        </form>
      </section>
    </main>

    <div class="container-fluid staff-grid-wrapper px-0">
      <div class="row g-0">
        <div class="col-12">
    <!-- ===== Material Requests Structure ===== -->
    <!-- Sections: root container, navigation/header layers, page content, actions/scripts -->
    <div class="material-requests d-none d-lg-block">
      <!-- Sidebar Navigation -->
      <div class="sidebar-panel"></div>
      <div class="sidebar-active-pill"></div>
      <a href="staff-scheduling-dashboard.html" class="nav-link scheduling">Scheduling</a>
      <a href="task-management-dashboard.html" class="nav-link tasks">Tasks</a>
      <a href="inventory-dashboard.html" class="inventory">Inventory</a>
      <!-- Top Header -->
      <div class="top-header-panel"></div>
      <img class="planted-logo-image" src="images/PlantedLogo1.png" />
      <div class="planted">Planted</div>
      <div class="staff-portal">Staff Portal</div>
      <a href="../login-portal/LoginPortal.html" class="sign-out">[→ Sign Out</a>
      <!-- Request Form -->
      <div class="request-form-card"></div>
      <div class="request-item-label">Item:</div>
      <div class="request-quantity-label">Quantity:</div>
      <!-- Page Heading -->
      <div class="page-title">Request Materials</div>
      <div class="page-subtitle">Request supplies</div>
      <div class="request-number-label">Request #</div>
      <div class="request-item-input-bg"></div>
      <input
        type="text"
        id="request-item-input"
        class="request-item-input"
        placeholder="Search"
      />
      <div class="request-note-label">Note:</div>
      <div class="request-note-input-bg"></div>
      <textarea
        id="request-note-input"
        class="request-note-input"
        placeholder="Add note"
      ></textarea>
      <div class="request-quantity-input-bg"></div>
      <input
        type="number"
        id="request-quantity-input"
        class="request-quantity-input"
        placeholder="Enter Amount"
        min="0"
        step="any"
      />
      <!-- Submit Action -->
      <button type="button" id="submit-material-request" class="submit-request-button"></button>
      <div class="submit-request-text">Submit</div>
    </div>
    <script src="./js/staff-material-forms.js"></script>
          </div>
      </div>
    </div>
      <script src="./js/staff-portal-scale.js"></script>
  </body>
</html>
