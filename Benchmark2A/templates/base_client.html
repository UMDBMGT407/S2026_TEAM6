<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Planted Client Dashboard{% endblock %}</title>

    {% block vendor_css %}{% endblock %}
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/design-system.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/base-style.css') }}"
    />
    {% block page_css %}{% endblock %}
  </head>
  <body>
    <div class="app-wrapper portal-app-shell client-portal-shell">
      <nav class="top-navbar portal-topbar">
        <div class="container-fluid d-flex align-items-center justify-content-between portal-topbar-inner">
          <div class="d-flex align-items-center portal-topbar-brand">
            <img class="logo-img" src="{{ url_for('static', filename='images/planted-logo-10.png') }}" alt="Planted Logo">
            <div>
              <div class="brand-name">Planted</div>
              <div class="brand-sub">Client Dashboard</div>
            </div>
          </div>
          <a href="{{ url_for('logout') }}" class="sign-out-link">&#8594; Sign Out</a>
        </div>
      </nav>

      <div class="container-fluid px-0 portal-shell-container">
        <div class="portal-shell">
          <nav class="sidebar portal-sidebar portal-sidebar-nav">
            <ul class="nav flex-column portal-nav-list">
              <li class="nav-item"><a href="{{ url_for('client_overview_page') }}" class="nav-link sidebar-link{% if active_page == 'overview' %} active-link{% endif %}">Overview</a></li>
              <li class="nav-item"><a href="{{ url_for('service_request_page') }}" class="nav-link sidebar-link{% if active_page == 'service-request' %} active-link{% endif %}">Service Request</a></li>
              <li class="nav-item"><a href="{{ url_for('appointments_page') }}" class="nav-link sidebar-link{% if active_page == 'appointments' %} active-link{% endif %}">Appointments</a></li>
              <li class="nav-item"><a href="{{ url_for('invoices_page') }}" class="nav-link sidebar-link{% if active_page == 'invoices' %} active-link{% endif %}">Invoices</a></li>
              <li class="nav-item"><a href="{{ url_for('profile_page') }}" class="nav-link sidebar-link{% if active_page == 'profile' %} active-link{% endif %}">Profile</a></li>
            </ul>
          </nav>

          <main class="main-content portal-main portal-main-surface">
            <div class="portal-main-inner">
              {% block page_content %}{% endblock %}
            </div>
          </main>
        </div>
      </div>
    </div>

    {% block vendor_js %}{% endblock %}
    {% block page_js %}{% endblock %}
  </body>
</html>
