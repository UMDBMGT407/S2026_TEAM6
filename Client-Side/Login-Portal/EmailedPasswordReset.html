<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset</title>
  <link rel="stylesheet" href="css/style-passwordreset.css" />
</head>
<body>
  <div class="emailed-password-reset">
    <div class="rectangle-1"></div>
    <div class="password-reset">Password Reset</div>
    <div class="change-your-password">Change Your Password</div>

    <!--
      This page is opened via a unique link sent to the user's email.
      The URL is expected to include a reset token, e.g.:
        https://planted.com/reset-password?token=abc123xyz

      TODO: When the backend is ready, wire the submit handler below
      to POST { token, newPassword } to your password-reset API endpoint.
    -->
    <form id="resetForm" novalidate>
      <!-- Token is read automatically from the URL query string on load -->
      <input type="hidden" id="resetToken" name="token" />

      <div class="frame-1">
        <label for="newPassword" class="new-password">New password*</label>
        <input
          type="password"
          id="newPassword"
          name="newPassword"
          class="email-box password-input"
          placeholder="Enter new password"
          required
          autocomplete="new-password"
        />
        <label for="confirmPassword" class="re-enter-new-password">Re-enter new password*</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          class="password-box password-input"
          placeholder="Re-enter new password"
          required
          autocomplete="new-password"
        />
      </div>

      <p id="errorMsg"   class="form-message error-message"   role="alert"  aria-live="polite"></p>
      <p id="successMsg" class="form-message success-message" role="status" aria-live="polite"></p>

      <button type="submit" class="sign-in-button">
        <span class="reset-password-label">Reset Password</span>
      </button>
    </form>
  </div>

  <script>
    // ── Token extraction ────────────────────────────────────────────────────
    // Reads the ?token= value from the URL that was emailed to the user.
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get("token");

      if (token) {
        document.getElementById("resetToken").value = token;
      } else {
        // No token present — flag the link as invalid immediately.
        document.getElementById("errorMsg").textContent =
          "This password reset link is invalid or has expired. " +
          "Please request a new one.";
      }
    })();

    // ── Form submission ─────────────────────────────────────────────────────
    document.getElementById("resetForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const token           = document.getElementById("resetToken").value;
      const newPassword     = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const errorMsg        = document.getElementById("errorMsg");
      const successMsg      = document.getElementById("successMsg");

      // Clear previous messages
      errorMsg.textContent   = "";
      successMsg.textContent = "";

      // ── Validation ────────────────────────────────────────────────────
      if (!token) {
        errorMsg.textContent =
          "Invalid or expired reset link. Please request a new password reset.";
        return;
      }

      if (newPassword.length < 8) {
        errorMsg.textContent = "Password must be at least 8 characters long.";
        return;
      }

      if (newPassword !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match. Please try again.";
        return;
      }

      // ── Backend integration (TODO) ────────────────────────────────────
      // Replace the placeholder below with a real API call once the
      // backend server is ready. Example:
      //
      // fetch("/api/reset-password", {
      //   method: "POST",
      //   headers: { "Content-Type": "application/json" },
      //   body: JSON.stringify({ token, newPassword }),
      // })
      //   .then(res => res.json())
      //   .then(data => {
      //     if (data.success) {
      //       successMsg.textContent = "Password reset! Redirecting to login…";
      //       setTimeout(() => { window.location.href = "/login"; }, 2000);
      //     } else {
      //       errorMsg.textContent = data.message || "Something went wrong.";
      //     }
      //   })
      //   .catch(() => {
      //     errorMsg.textContent = "Network error. Please try again.";
      //   });

      // ── Placeholder success response (remove when backend is connected) ─
      successMsg.textContent =
        "Your password has been reset successfully. You may now log in.";
      this.reset();
    });
  </script>
</body>
</html>
