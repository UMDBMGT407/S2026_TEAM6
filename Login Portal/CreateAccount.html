<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planted - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Cardo:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style-create.css">
</head>
<body>
    <div class="landing-page">
        <img class="plant-photo-2" src="images/plant-photo-20.png" alt="Plant Photo">
        <div class="login-container">
            <h1 class="planted">Planted</h1>
            <p class="plant-management-solutions">Plant Management Solutions</p>
            <div class="rectangle-1 login-card">
                <h2 class="welcome-back">Create Account</h2>
                <p class="login-to-your-account">Sign up for a new account</p>
                <form class="frame-1" action="/create-account" method="post">
                    <label for="name">Full Name</label>
                    <input class="email-box" type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input class="email-box" type="email" id="email" name="email" required>

                    <label for="password">Password</label>
                    <input class="password-box" type="password" id="password" name="password" required>

                    <label for="confirm-password">Confirm Password</label>
                    <input class="password-box" type="password" id="confirm-password" name="confirm-password" required>

                    <div class="error-messages">
                        <p id="name-error" class="error-text"></p>
                        <p id="email-error" class="error-text"></p>
                        <p id="password-error" class="error-text"></p>
                        <p id="confirm-password-error" class="error-text"></p>
                    </div>

                    <button type="submit" class="sign-in-button">Create Account</button>
                    <a href="LoginPortal.html" class="sign-in-link">Already have an account? Sign in here</a>
                </form>
            </div>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
