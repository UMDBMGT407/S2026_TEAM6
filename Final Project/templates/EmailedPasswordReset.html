<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth-base.css') }}">
</head>
<body>
  <div class="auth-reset-page">
    <div class="auth-reset-shell">
      <img class="logo-img" src="{{ url_for('static', filename='images/planted-logo-10.png') }}" alt="Planted Logo" />
      <div class="auth-reset-brand">Planted</div>
      <div class="auth-reset-subbrand">Plant Management Solutions</div>
      <div class="auth-reset-card">
        <div class="change-your-password">Change Your Password</div>
        <div class="password-reset">Password Reset</div>

        <form id="resetForm" class="auth-reset-form" novalidate>
          <input type="hidden" id="resetToken" name="token" />
          <label for="newPassword" class="new-password">New password*</label>
          <input
            type="password"
            id="newPassword"
            name="newPassword"
            class="email-box password-input"
            placeholder="Enter new password"
            required
            autocomplete="new-password"
          />
          <label for="confirmPassword" class="re-enter-new-password">Re-enter new password*</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            class="password-box password-input"
            placeholder="Re-enter new password"
            required
            autocomplete="new-password"
          />

          <p id="errorMsg" class="form-message error-message" role="alert" aria-live="polite"></p>
          <p id="successMsg" class="form-message success-message" role="status" aria-live="polite"></p>

          <button type="submit" class="sign-in-button">
            <span class="reset-password-label">Reset Password</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (token) {
        document.getElementById("resetToken").value = token;
      } else {
        document.getElementById("errorMsg").textContent =
          "This password reset link is invalid or has expired. Please request a new one.";
      }
    })();

    // Form submission
    document.getElementById("resetForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const token = document.getElementById("resetToken").value;
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");

      errorMsg.textContent = "";
      successMsg.textContent = "";

      // Validation checks
      if (!token) {
        errorMsg.textContent =
          "Invalid or expired reset link. Please request a new password reset.";
        return;
      }

      if (newPassword.length < 8) {
        errorMsg.textContent = "Password must be at least 8 characters long.";
        return;
      }

      if (newPassword !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match. Please try again.";
        return;
      }

      // Placeholder success response until backend wiring is added
      successMsg.textContent =
        "Your password has been reset successfully. You may now log in.";
      this.reset();
    });
  </script>
</body>
</html>
