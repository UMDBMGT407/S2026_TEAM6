<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Planted Staff Portal{% endblock %}</title>

    {% block vendor_css %}
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    {% endblock %}
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/design-system.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/base-style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/staff-portal-base.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/staff-modal-base.css') }}"
    />
    {% block page_css %}{% endblock %}
  </head>
  <body>
    <div class="app-wrapper portal-app-shell">
      <nav class="top-navbar portal-topbar">
        <div class="container-fluid d-flex align-items-center justify-content-between portal-topbar-inner">
          <div class="d-flex align-items-center portal-topbar-brand">
            <img class="logo-img" src="{{ url_for('static', filename='images/planted-logo-10.png') }}" alt="Planted Logo">
            <div>
              <div class="brand-name">Planted</div>
              <div class="brand-sub">Staff Portal</div>
            </div>
          </div>
          <a href="{{ url_for('logout') }}" class="sign-out-link">&#8594; Sign Out</a>
        </div>
      </nav>

      <div class="container-fluid px-0 portal-shell-container">
        <div class="row g-0 portal-shell">
          <nav class="col-12 col-lg-3 col-xl-auto sidebar portal-sidebar portal-sidebar-nav">
            <ul class="nav flex-column portal-nav-list">
              <li class="nav-item">
                <a href="{{ url_for('staff_scheduling_dashboard_page') }}" class="nav-link sidebar-link{% if active_page == 'scheduling' %} active-link{% endif %}">
                  Scheduling
                </a>
              </li>
              <li class="nav-item">
                <a href="{{ url_for('task_management_dashboard_page') }}" class="nav-link sidebar-link{% if active_page == 'tasks' %} active-link{% endif %}">
                  Tasks
                </a>
              </li>
              <li class="nav-item">
                <a href="{{ url_for('inventory_dashboard_page') }}" class="nav-link sidebar-link{% if active_page in ['inventory', 'material-requests', 'used-material-log'] %} active-link{% endif %}">
                  Inventory
                </a>
              </li>
              <li class="nav-item">
                <a href="{{ url_for('staff_profile_page') }}" class="nav-link sidebar-link{% if active_page == 'profile' %} active-link{% endif %}">
                  My Profile
                </a>
              </li>
            </ul>
          </nav>

          <main class="col-12 col-lg main-content portal-main staff-main-content">
            <div class="portal-main-inner">
              {% block page_content %}{% endblock %}
            </div>
          </main>
        </div>
      </div>
    </div>

    {% block vendor_js %}
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
    {% endblock %}
    {% block page_js %}{% endblock %}
  </body>
</html>
